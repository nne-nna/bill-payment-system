spring.application.name=bill-payment-system
server.port=${PORT:8080}
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Paystack
paystack.secret.key=${PAYSTACK_SECRET_KEY}
paystack.base.url=${PAYSTACK_BASE_URL:https://api.paystack.co}

# VTPass
vtpass.base.url=${VTPASS_BASE_URL:https://sandbox.vtpass.com/api}
vtpass.api.key=${VTPASS_API_KEY}
vtpass.secret.key=${VTPASS_SECRET_KEY}
vtpass.public.key=${VTPASS_PUBLIC_KEY}

# Email
brevo.api.key=${BREVO_API_KEY}
brevo.sender.email=${BREVO_SENDER_EMAIL}
brevo.sender.name=${BREVO_SENDER_NAME:PayEase}

# App URL
app.frontend.url=${APP_FRONTEND_URL}
